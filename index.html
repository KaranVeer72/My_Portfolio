<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Basic page setup -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Karan Veer Singh | Portfolio</title>

  <!-- CSS: all page styling lives in this style tag -->
  <style>
    /* Reset: removes default browser spacing */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* Theme variables: change these colors to customize the site */
    :root {
      --bg: #0d0f12;
      --surface: #171a20;
      --surface-light: #20242c;
      --text: #f3f1ea;
      --muted: #b7b0a1;
      --gold: #d4af37;
      --gold-soft: #f0d678;
      --border: rgba(212, 175, 55, 0.22);
      --shadow: rgba(0, 0, 0, 0.35);
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.6;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(212, 175, 55, 0.13), transparent 32rem),
        var(--bg);
    }

    .container {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(13, 15, 18, 0.88);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
    }

    nav {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .logo {
      color: var(--gold-soft);
      font-size: 1.1rem;
      font-weight: 700;
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 18px;
      list-style: none;
    }

    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.95rem;
    }
